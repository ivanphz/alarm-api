# ==============================================================================
# GitHub Actions — 推送到 main 即部署到 Cloudflare Worker
# ⚠️ 全文 @OWNER 换成你的 GitHub 用户名(小写)。
#
# 一次性 Secret(Settings → Secrets and variables → Actions):
#   CF_API_TOKEN / CF_ACCOUNT_ID  —— Cloudflare 部署凭据(原有)
#   GH_PAT                        —— 读取私有包 @OWNER/workdays-core(新增, 见 INTEGRATION §2.2)
#
# ⚠️ 家庭日历 CALENDAR_URLS 是【Worker Secret】(在 Cloudflare 那边, `wrangler secret put` 配一次),
#    不是 GitHub Secret, 本工作流不涉及、部署也不会动它。
# ==============================================================================

name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node(带 GitHub Packages 私有源)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@OWNER'

      - name: 安装依赖(workdays-core 从私有源拉取)
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4"
          # wrangler(esbuild)会自动把 node_modules 里 import 到的包打进 bundle
